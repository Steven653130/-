<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物知识详情 - PetQAA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .article-content {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 20px 0;
            overflow: hidden;
        }

        .article-header {
            padding: 30px 40px;
            border-bottom: 1px solid #eee;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .article-time {
            font-size: 14px;
            color: #666;
        }

        .lang-selector {
            display: flex;
            gap: 5px;
        }

        .lang-btn {
            padding: 8px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            background: #f0f0f0;
        }

        .lang-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .article-title {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
            line-height: 1.3;
        }

        .article-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }

        .article-body {
            padding: 40px;
        }

        .article-summary {
            background: #f9f9f9;
            padding: 20px;
            border-left: 4px solid #667eea;
            margin-bottom: 30px;
            border-radius: 4px;
            font-size: 16px;
            line-height: 1.6;
            color: #555;
        }

        .article-text {
            font-size: 16px;
            line-height: 1.8;
            color: #444;
        }

        .article-text p {
            margin-bottom: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 4px;
            margin: 20px 0;
            border-left: 4px solid #c33;
        }

        .source-link {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .source-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .source-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .article-header {
                padding: 20px 20px;
            }

            .article-body {
                padding: 20px;
            }

            .article-title {
                font-size: 24px;
            }

            .article-text {
                font-size: 15px;
            }

            header .container {
                flex-direction: column;
                gap: 10px;
            }

            .article-meta {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <button class="back-btn">← 返回列表</button>
            <h1 style="flex: 1; text-align: center;">宠物知识详情</h1>
            <div style="width: 100px;"></div>
        </div>
    </header>

    <div class="container">
        <div id="article-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载文章...</p>
            </div>
        </div>
    </div>

    <script>
        const escapeHtmlText = (str) => String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const normalizeHttpUrl = (value) => {
            try {
                const trimmed = String(value || '').trim().replace(/[)）\]】,，。;；\s]+$/g, '');
                const u = new URL(trimmed);
                return (u.protocol === 'http:' || u.protocol === 'https:') ? u.href : '';
            } catch {
                return '';
            }
        };

        const formatTime = (value) => {
            if (!value) {
                return '';
            }
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return '';
            }
            return date.toLocaleString('zh-CN', { hour12: false });
        };

        const getUrlParam = (name, defaultValue = '') => {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || defaultValue;
        };

        let articleData = null;
        let currentLang = getUrlParam('lang', 'zh');

        const renderArticle = () => {
            if (!articleData) {
                return;
            }

            const langData = articleData.languages[currentLang] || articleData.languages['zh'];
            const title = escapeHtmlText(langData.title || '');
            const summary = escapeHtmlText(langData.summary || '');
            const content = escapeHtmlText(langData.content || '');
            const imageUrl = normalizeHttpUrl(articleData.image_url || '');
            const sourceUrl = normalizeHttpUrl(articleData.url || '');
            const publishedTime = formatTime(articleData.created_at || '');

            const availableLangs = Object.keys(articleData.languages || {});
            const langButtonsHtml = availableLangs.map(lang => {
                const isActive = lang === currentLang ? 'active' : '';
                return `<button class="lang-btn ${isActive}" data-lang="${lang}">${lang.toUpperCase()}</button>`;
            }).join('');

            const sourceLink = sourceUrl
                ? `<a href="${escapeHtmlText(sourceUrl)}" target="_blank" rel="noopener noreferrer">查看原文</a>`
                : '无原文链接';

            const imageHtml = imageUrl
                ? `<img src="${escapeHtmlText(imageUrl)}" alt="文章配图" class="article-image">`
                : '';

            const html = `
                <article class="article-content">
                    <div class="article-header">
                        <div class="article-meta">
                            <div class="article-time">${publishedTime}</div>
                            <div class="lang-selector">${langButtonsHtml}</div>
                        </div>
                        <h1 class="article-title">${title}</h1>
                    </div>
                    ${imageHtml}
                    <div class="article-body">
                        <div class="article-summary">${summary}</div>
                        <div class="article-text">${content.split('\n').map(line => `<p>${line}</p>`).join('')}</div>
                        <div class="source-link">原文链接：${sourceLink}</div>
                    </div>
                </article>
            `;

            document.getElementById('article-container').innerHTML = html;

            // Add language button listeners
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const lang = btn.dataset.lang;
                    if (lang !== currentLang) {
                        currentLang = lang;
                        window.history.replaceState(null, '', `?id=${articleData.id}&lang=${encodeURIComponent(lang)}`);
                        renderArticle();
                    }
                });
            });
        };

        const loadArticle = async () => {
            const articleId = getUrlParam('id');
            if (!articleId) {
                document.getElementById('article-container').innerHTML = `
                    <div class="error">
                        <strong>错误</strong>：无效的文章ID
                    </div>
                `;
                return;
            }

            try {
                const url = `/web/backend/api/article.php?id=${encodeURIComponent(articleId)}&lang=${encodeURIComponent(currentLang)}&t=${Date.now()}`;
                const response = await fetch(url);
                const raw = await response.text();
                let parsed = null;
                try {
                    parsed = JSON.parse(raw);
                } catch (_) {
                    const snippet = String(raw || '').slice(0, 180).replace(/\s+/g, ' ').trim();
                    throw new Error(`详情接口返回了非JSON内容：${snippet || 'empty response'}`);
                }

                if (!response.ok) {
                    throw new Error(parsed?.error || `HTTP ${response.status}`);
                }
                articleData = parsed;
                if (articleData.error) {
                    throw new Error(articleData.error);
                }
                renderArticle();
            } catch (error) {
                document.getElementById('article-container').innerHTML = `
                    <div class="error">
                        <strong>加载失败</strong>：${escapeHtmlText(error.message)}
                    </div>
                `;
            }
        };

        // Back button handler
        document.querySelector('.back-btn').addEventListener('click', () => {
            window.history.back();
        });

        // Load article on page load
        loadArticle();
    </script>
</body>
</html>
